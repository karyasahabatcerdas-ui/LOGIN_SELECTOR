<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Masuk - Sistem Akses</title>
</head>
<body data-theme="dark"> <!-- Default Theme -->
    <div class="login-card">
        <h2>Selamat Datang</h2>
        <p>Silakan masuk ke akun Anda</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="loginBtn">Masuk</button>
        </form>
        <p id="msg"></p>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyk-NZwhjlakyMvKYtBv_kSjlhE5DoxfZmBdbX5QZKBp1VAYR0UMo_ZEoqqCFnNdsnn/exec";

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerText = "Memproses...";
            
            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('session_uuid', data.uuid);
                    localStorage.setItem('user_name', data.username);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_theme', data.userTheme);
                    localStorage.setItem('user_phone', data.phone);
                    localStorage.setItem('user_email', data.email);
                    localStorage.setItem('user_photo', data.photo);
                    
                    window.location.href = 'index.html';
                } else {
                    alert("Gagal: " + data.message);
                }
            } catch (err) {
                alert("Terjadi kesalahan koneksi.");
            } finally {
                btn.innerText = "Masuk";
            }
        });
    </script>
</body>
</html>
