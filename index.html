<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="login-card">
        <h1 id="welcome">Memuat...</h1>
        <p>Role Anda: <b id="roleLabel">-</b></p>
        <div id="adminPanel" style="display: none;">
            <hr>
            <h3>Admin Tools</h3>
            <button onclick="createUser()">Buat User Baru</button>
        </div>
        <br>
        <button onclick="logout()" style="background: #666;">Keluar</button>
    </div>

    <script>
        window.onload = () => {
            const uuid = localStorage.getItem('session_uuid');
            const theme = localStorage.getItem('user_theme') || 'dark';
            const role = localStorage.getItem('user_role');

            if (!uuid) window.location.href = 'login.html';

            // Terapkan Tema
            document.body.setAttribute('data-theme', theme);
            
            // Terapkan Role Logic (Hidden UX)
            document.getElementById('welcome').innerText = "Halo, User!";
            document.getElementById('roleLabel').innerText = role;

            if (role === 'superadmin' || role === 'supervisor') {
                document.getElementById('adminPanel').style.display = 'block';
            }
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
