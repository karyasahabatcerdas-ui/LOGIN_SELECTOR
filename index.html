<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <title>Dashboard Portal</title>
    <style>
        /* Tambahan Style UX Langsung */
        :root { --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-y: auto; }
        .login-card { max-width: 500px; width: 100%; padding: 25px; position: relative; overflow: hidden; }
        
        /* Profile UI */
        .profile-header { position: relative; margin-bottom: 30px; text-align: center; }
        .avatar-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto; transition: var(--transition); }
        .avatar-wrapper:hover { transform: scale(1.05); }
        #userPhoto { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .upload-badge { position: absolute; bottom: 5px; right: 5px; background: var(--accent); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border: 2px solid var(--card); }
        
        /* Form Styling */
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px; transition: var(--transition); }
        input:focus { border-color: var(--accent); outline: none; background: rgba(255,255,255,0.08); }
        input[readonly] { opacity: 0.6; cursor: not-allowed; }

        /* Admin Management Table */
        .admin-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .table-container { background: rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(255,255,255,0.05); padding: 12px; font-size: 10px; text-align: left; }
        td { padding: 12px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        
        /* Action Buttons */
        .btn-action { padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; transition: var(--transition); }
        .btn-del { background: #ff4d4d; color: white; }
        .btn-del:hover { background: #ff1a1a; transform: translateY(-2px); }
        
        /* Toast Notification */
        #toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 25px; border-radius: 5px; background: var(--accent); color: white; display: none; z-index: 999; animation: slideUp 0.4s ease; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body id="mainBody">
    <div id="toast">Notifikasi</div>

    <div class="login-card">
        <!-- PROFILE HEADER -->
        <div class="profile-header">
            <div class="avatar-wrapper">
                <img id="userPhoto" src="https://via.placeholder.com" alt="Avatar">
                <label for="fileInput" class="upload-badge"><i class="fas fa-camera"></i></label>
            </div>
            <input type="file" id="fileInput" style="display:none;" accept="image/*" onchange="uploadToFDApp()">
            <h2 id="profileName" style="margin: 15px 0 5px;">Username</h2>
            <div id="badgeRole" style="display:inline-block; font-size:10px; padding:4px 12px; border-radius:20px; background:var(--accent); color:white; font-weight:bold; letter-spacing:1px;">ROLE</div>
        </div>

        <!-- SETTINGS FORM -->
        <div class="settings-form">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" id="edit_email" readonly>
            </div>
            <div class="input-group">
                <label><i class="fas fa-phone"></i> WhatsApp Number</label>
                <input type="text" id="edit_phone" placeholder="08xxxx">
            </div>

            <!-- ADMIN CONTROLS -->
            <div id="adminControl" style="display:none; background: rgba(var(--accent-rgb), 0.1); padding:15px; border-radius:8px; border-left:4px solid var(--accent); margin-top:20px;">
                <label style="color:var(--accent); font-size:11px; font-weight:bold;"><i class="fas fa-user-shield"></i> Level Akses (Admin Only)</label>
                <select id="edit_role" style="margin-top:8px;">
                    <option value="user">User</option>
                    <option value="staff">Staff</option>
                    <option value="supervisor">Supervisor</option>
                    <option value="admin">Admin</option>
                </select>
                <p style="font-size:10px; opacity:0.7; margin-top:8px;"><i class="fas fa-info-circle"></i> Update ini akan mereset login attempt & status akun.</p>
            </div>

            <button id="btnSave" onclick="saveProfile()" style="margin-top:25px; width:100%; font-weight:bold;">
                <i class="fas fa-save"></i> SIMPAN PERUBAHAN
            </button>
        </div>

        <!-- USER LIST (ADMIN ONLY) -->
        <div id="adminArea" class="admin-section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h4 style="margin:0;"><i class="fas fa-users"></i> Management User</h4>
                <button onclick="toggleAddForm()" style="width:auto; padding:5px 15px; font-size:11px;"><i class="fas fa-user-plus"></i> Tambah</button>
            </div>

            <div id="addUserForm" style="display:none; margin-top:15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:8px;">
                <input type="text" id="new_user" placeholder="Username Baru" style="margin-bottom:10px;">
                <input type="password" id="new_pass" placeholder="Password Baru" style="margin-bottom:10px;">
                <button onclick="createNewUser()" style="background:var(--accent); font-size:12px;">DAFTARKAN USER</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>USERNAME</th>
                            <th>ROLE</th>
                            <th>APPROVED</th>
                            <th>AKSI</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Data injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>

        <button onclick="logout()" style="background:transparent; border:1px solid #444; color:#888; margin-top:30px; width:100%;">
            <i class="fas fa-sign-out-alt"></i> KELUAR SISTEM
        </button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzUgUW7b418Y1dE53ipWpO79pTBzjiWAJnHoVvK4cD7oZ2Xbu6M-CNBfINhzYrOUCp3/exec";
        const FD_APP_URL = "1qLtWF3BR6E24aws6dgaNXWiA5OiuJO0X";

        window.onload = () => {
            const uuid = localStorage.getItem('session_uuid');
            if (!uuid) return window.location.href = 'login.html';

            // UI Init
            document.body.setAttribute('data-theme', localStorage.getItem('user_theme') || 'dark');
            document.getElementById('profileName').innerText = localStorage.getItem('user_name');
            document.getElementById('badgeRole').innerText = localStorage.getItem('user_role').toUpperCase();
            document.getElementById('edit_email').value = localStorage.getItem('user_email');
            document.getElementById('edit_phone').value = localStorage.getItem('user_phone');
            document.getElementById('userPhoto').src = localStorage.getItem('user_photo') || "https://via.placeholder.com";

            // Role Security
            const role = localStorage.getItem('user_role');
            if (['admin', 'superadmin', 'supervisor'].includes(role)) {
                document.getElementById('adminControl').style.display = 'block';
                document.getElementById('edit_email').readOnly = false;
                document.getElementById('adminArea').style.display = 'block';
                loadUsersTable();
            }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        async function saveProfile() {
            const btn = document.getElementById('btnSave');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
            
            const payload = {
                action: "updateUser",
                adminRole: localStorage.getItem('user_role'),
                targetUser: localStorage.getItem('user_name'),
                newPhone: document.getElementById('edit_phone').value,
                newEmail: document.getElementById('edit_email').value,
                newRole: document.getElementById('edit_role').value || localStorage.getItem('user_role')
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.success) {
                    showToast("Data Berhasil Disimpan!");
                    localStorage.setItem('user_phone', payload.newPhone);
                    localStorage.setItem('user_email', payload.newEmail);
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (e) { showToast("Gagal menyimpan data!"); }
            btn.innerHTML = originalText;
        }

        async function uploadToFDApp() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if(!file) return;

            showToast("Mengunggah foto profil...");
            const formData = new FormData();
            formData.append('file', file);
            formData.append('filename', localStorage.getItem('user_name'));

            try {
                const resFD = await fetch(FD_APP_URL, { method: 'POST', body: formData });
                const dataFD = await resFD.json();

                if (dataFD.url) {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "updatePhoto", username: localStorage.getItem('user_name'), photoUrl: dataFD.url })
                    });
                    document.getElementById('userPhoto').src = dataFD.url;
                    localStorage.setItem('user_photo', dataFD.url);
                    showToast("Foto Berhasil Diperbarui!");
                }
            } catch (e) { showToast("Gagal unggah foto!"); }
        }

        async function loadUsersTable() {
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Memuat data...</td></tr>';
            
            const res = await fetch(`${GAS_URL}?role=${localStorage.getItem('user_role')}`);
            const data = await res.json();
            tbody.innerHTML = "";

            data.users.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td><b>${u.username}</b></td>
                        <td>${u.role}</td>
                        <td>${u.approvedBy ? '<i class="fas fa-check-circle" style="color:#2ea44f"></i>' : '<span style="color:#888">---</span>'}</td>
                        <td>
                            <button class="btn-action btn-del" onclick="deleteUser(${u.rowIndex})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleAddForm() {
            const f = document.getElementById('addUserForm');
            f.style.display = f.style.display === 'none' ? 'block' : 'none';
        }

        function logout() {
            if(confirm("Apakah Anda yakin ingin keluar?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
