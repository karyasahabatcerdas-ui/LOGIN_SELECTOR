<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Sistem</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; }
        #sidebar { width: 250px; height: 100vh; background: #2c3e50; color: white; padding: 20px; }
        #main-content { flex-grow: 1; padding: 30px; background: #f4f7f6; }
        .menu-item { display: block; padding: 10px; color: white; text-decoration: none; border-bottom: 1px solid #34495e; }
        .menu-item:hover { background: #34495e; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #e74c3c; }
        #logout-btn { margin-top: 20px; cursor: pointer; color: #ff7675; border: none; background: none; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <h3>App Menu</h3>
        <div id="nav-container">
            <!-- Navigasi akan di-load di sini secara dinamis -->
        </div>
        <button id="logout-btn" onclick="logout()">Logout</button>
    </aside>

    <main id="main-content">
        <h1>Dashboard <span id="role-display" class="badge"></span></h1>
        <div id="ui-loader">
            <!-- Konten spesifik level di-load di sini -->
        </div>
    </main>

    <script>
        // 1. Ambil data dari memory client
        const userRole = localStorage.getItem('role') || 'guest';
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        // Redirect jika belum login (kecuali guest diizinkan)
        if (!isLoggedIn && userRole !== 'guest') {
            window.location.href = 'login.html';
        }

        // 2. Definisi Fitur & Hak Akses (Pola UX Load)
        const accessControl = {
            'super_admin': {
                label: 'Super Admin',
                menu: ['Sistem Log', 'User Management', 'Billing', 'Laporan Gaji', 'Input Data'],
                html: '<h3>Full System Access</h3><p>Anda memiliki kontrol penuh atas infrastruktur.</p>'
            },
            'admin': {
                label: 'Admin',
                menu: ['User Management', 'Laporan Gaji', 'Input Data'],
                html: '<h3>Admin Panel</h3><p>Kelola pengguna dan operasional harian.</p>'
            },
            'supervisor': {
                label: 'Supervisor',
                menu: ['Approval List', 'Laporan Tim', 'Input Data'],
                html: '<h3>Supervisor Monitor</h3><p>Lakukan verifikasi dan tinjauan laporan tim.</p>'
            },
            'operator': {
                label: 'Operator',
                menu: ['Input Data', 'Update Stok'],
                html: '<h3>Operator Workspace</h3><p>Silahkan masukkan data transaksi hari ini.</p>'
            },
            'user': {
                label: 'User',
                menu: ['Profile Saya', 'Riwayat Pesanan'],
                html: '<h3>User Portal</h3><p>Selamat datang kembali di akun Anda.</p>'
            },
            'guest': {
                label: 'Guest',
                menu: ['Info Publik', 'Daftar Akun'],
                html: '<h3>Welcome Guest</h3><p>Silahkan login untuk mengakses fitur lengkap.</p>'
            }
        };

        // 3. Eksekusi "Load" berdasarkan Level
        function initDashboard() {
            const config = accessControl[userRole];
            
            // Render Label Role
            document.getElementById('role-display').innerText = config.label;

            // Render Navigasi (Hanya yang diizinkan untuk role tersebut)
            const nav = document.getElementById('nav-container');
            config.menu.forEach(item => {
                const link = document.createElement('a');
                link.className = 'menu-item';
                link.href = '#';
                link.innerText = '• ' + item;
                nav.appendChild(link);
            });

            // Render Body Konten
            document.getElementById('ui-loader').innerHTML = config.html;
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Jalankan saat halaman dimuat
        initDashboard();
    </script>
</body>
</html>
